name: Release

on:
  workflow_call:
    inputs:
      github-release:
        required: false
        type: boolean
        default: true
      publish:
        required: false
        type: boolean
        default: false
      stage:
        required: false
        type: boolean
        default: false
      build:
        required: false
        type: string
        default: ''
      tag:
        required: false
        type: string
        default: ''

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Setup Vite Plus
        uses: sxzz/workflows/setup-vp@main
        with:
          fetch-all: true
          cache: false

      - name: Generate GitHub Changelog
        run: vpx changelogithub
        continue-on-error: true
        if: ${{ inputs.github-release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: ${{ inputs.build }}
        if: ${{ inputs.build && inputs.publish }}

      - name: Publish to NPM
        run: vp pm ${{ inputs.stage && 'stage ' || '' }}publish --access public --no-git-checks ${{ inputs['tag'] && format('--tag {0}', inputs['tag']) || '' }} -r
        if: ${{ inputs.publish || inputs.stage }}
